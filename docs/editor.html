<script>
  (()=>{
    function Writer(root, output) {
      this.chars = {
        "?": "_",
        "b": "b",
        "c": "c",
        "ch": "ch",
        "d": "dz",
        "đ": "d",
        "dd": "d",
        "g": "g",
        "gi": "dz",
        "h": "h",
        "j": "dz",
        "kh": "kh",
        "l": "l",
        "m": "m",
        "n": "n",
        "ng": "ng",
        "nh": "nh",
        "ph": "ph",
        "qu": "c",
        "r": "r",
        "s": "s",
        "t": "t",
        "th": "th",
        "tr": "tr",
        "v": "v",
        "x": "x",
        
        "a": "a",
        "ă": "aw",
        "ơ": "a2",
        "â": "aw2",
        "ê": "e",
        "e": "e2",
        "i": "i",
        "ia": "i2",
        "ô": "o",
        "o": "o2",
        "u": "u",
        "ua": "u2",
        "ư": "y",
        "ưa": "y2",
        "ngang": "",
        "sắc": "1",
        "huyền": "2",
        "hỏi": "3",
        "ngã": "4",
        "nặng": "5",
      }
      
      this.root = root
      this.output = output
      root.addEventListener("input", this.handleInput.bind(this))
    }
    
    Writer.prototype.parseWord = function(word) {
      word = word.toLowerCase().trim();
    
      // Extract tones
      const toneMap = {
        "\u0301": "sắc",
        "\u0300": "huyền",
        "\u0309": "hỏi",
        "\u0303": "ngã",
        "\u0323": "nặng"
      };
    
      let tone = "ngang";
      let nfd = word.normalize("NFD").replace(
        /[\u0300\u0301\u0303\u0309\u0323]/g,
        m => (tone = toneMap[m], "")
      );
      let base = nfd.normalize("NFC");
    
      // Onsets
      const onsets = [
        "ngh","ng","gh","ph","th","tr","ch","nh","kh",
        "gi","qu","b","c","d","đ","g","h","k","l","m",
        "n","p","r","s","t","v","x","q"
      ];
    
      let onset = "?";
      for (const o of onsets) {
        if (base.startsWith(o)) {
          onset = o;
          base = base.slice(o.length);
          break;
        }
      }
      
      // remove h in ngh and gh
      if (onset == "gh") onset = "g"
      if (onset == "ngh") onset = "ng"
      if (onset == "q") onset = "qu"
    
      // Codas
      const codas = ["ng","nh","ch","m","n","p","t","c"];
      let coda = "";
      for (const c of codas) {
        if (base.endsWith(c)) {
          coda = c;
          base = base.slice(0, -c.length);
          break;
        }
      }
    
      // Nucleus
      let medial = "";
      let offglide = "";
      let vowel = base;
    
      if(onset == "qu") {
          medial = "o"
      }
      
      if ((coda == "nh" || coda == "ch") && vowel == "a") vowel = "ă";
            
      // --- find medial ---
      if (vowel.length >= 2) {
        const first = vowel[0];
        const second = vowel[1];
        
        // u-rules
        if (first === "u") {
          if ("âêyơ".indexOf(second) > -1) {
            medial = "u";
            vowel = vowel.slice(1);
          }
        }
    
        // o-rules
        else if (first === "o" && (second === "a" || second === "e")) {
          medial = "o";
          vowel = vowel.slice(1);
        }
        
        else if (medial && first == "ô") vowel = "â" + second

      }
          
      // --- Offglide (i/y/o/u at end) ---
      if (vowel.length > 1 && /[iyou]$/.test(vowel)) {
        offglide = vowel.slice(-1);
        vowel = vowel.slice(0, -1);
        
        // ai/ay/ao/au distinction
        if (vowel == "a" && (offglide == "y" || offglide == "u")) {
          vowel = "ă"
        }
        
        // i/y and u/o to same representation
        if (offglide == "y") {
          offglide = "i"
        } else if (offglide == "o") {
          offglide = "u"
        }
      }
      
      // gi has a default vowel
      if (onset == "gi" && vowel == "") vowel = "i"
    
      
      if (vowel == "iê") vowel = "ia"
      else if (vowel == "yê") vowel = "ia"
      else if (vowel == "ya") vowel = "ia"
      else if (vowel == "y") vowel = "i"
      else if (vowel == "uô") vowel = "ua"
      else if (vowel == "ươ") vowel = "ưa"

      return {
        onset,
        medial,
        vowel,
        offglide,
        coda,
        tone
      };
    }
    
    Writer.prototype.parseSentence = function(sentence) {
      const result = [];
      const regex = /\p{L}+|\P{L}+/gu; // Words OR non-words
      const tokens = sentence.normalize("NFC").match(regex) || [];
    
      for (const token of tokens) {
        if (/^\p{L}+$/u.test(token)) {
          // Word → syllabic analysis
          const parsed = this.parseWord(token);
          result.push({
            word: token,
            onset: parsed.onset || "",
            medial: parsed.medial || "",
            vowel: parsed.vowel,
            offglide: parsed.offglide || "",
            coda: parsed.coda || "",
            tone: parsed.tone
          });
        } else {
          // Characters in between → unchanged
          result.push({ word: token });
        }
      }
    
      return result;
    }
    
    Writer.prototype.translate = function(text){
      const tokens = this.parseSentence(text)
      let output = ""
      tokens.forEach((t) => {
        if (t.vowel) {
          const head = this.chars[t.onset] || t.onset
          const medial = t.medial ? this.chars["u"] : ""
          const vowelTmp = this.chars[t.vowel] || t.vowel
          let vowel = this.chars[vowelTmp.toLowerCase()] || vowelTmp
          if (medial) {
            vowel = "w" + vowel;
          }
          const offglide = this.chars[t.offglide] || t.offglide || ""
          const coda = this.chars[t.coda] || t.coda
          const tone = this.chars[t.tone] || ""
          console.log(JSON.stringify(t))
          let parts = [head || "", vowel || "", offglide || coda || "", tone]
          output += parts.join(",");
          
        } else {
          output += t.word
        }
      })
      return output
    }
    Writer.prototype.handleInput = function(){
      const text = this.root.value
      const codes = this.translate(text)
      this.output.innerHTML = "";
      pa(codes, this.output)
    }
    window.Writer = Writer
  })()
  const writer = new Writer(
    document.getElementById("writer"),
    document.getElementById("output"),
  )
</script>

<script>
var showTable = false;
var v = 0;
var svgContent = document.getElementById("svg").innerHTML;
function display(version){
document.getElementById("out").innerHTML = ""
version = version || ((v++ % 2) + 1);
var onset_prefix = "v2-";
var vowel_prefix = "v2-";
var coda_prefix = "v2-";
var char_fontsize = "105px";
var qatt_tones = true;
if (version == 1) {
    qatt_tones = true;
	onset_prefix = "v2-";
	vowel_prefix = "v2-";
	coda_prefix = "v2-";
} else if (version == 4) {
    qatt_tones = true;
	onset_prefix = "";
	vowel_prefix = "v2-";
	coda_prefix = "";
} else if(version == 3){
    qatt_tones = true;
	onset_prefix = "v2-";
	vowel_prefix = "";
	coda_prefix = "v2-";
} else if(version == 2){
    qatt_tones = false;
	onset_prefix = "";
	vowel_prefix = "";
	coda_prefix = "";
}



var svgns = "http://www.w3.org/2000/svg";
var xlinkns = "http://www.w3.org/1999/xlink";
var svg = document.getElementById("svg");
svg.innerHTML = svgContent;
var pre = "_ b c ch d dz ph g h kh l m n ng nh r s t th tr v x".split(" ");
var nuc = "a a2 aw aw2 o o2 u u2 y y2 i i2 e e2".split(" ");

//table.setAttribute('id', 'table');
function getPost(glide, nucleus) {
    if (nucleus.charAt(0) == "w") nucleus = nucleus.substr(1)
    let el = document.getElementById(nucleus);
    if (el && el.dataset.onsetsize) return el.dataset.onsetsize
	var post = "small";
	if ("a a2".split(" ").indexOf(nucleus) > -1) post = "large";
	if ("o o2 e e2 i2 u2 y".split(" ").indexOf(nucleus) > -1) post = "xsmall";
	if (glide) post = post == "large" ? "small" : "xsmall";
	return post;
}

var group = document.createElementNS(svgns, "g");
if (showTable) {
  group.append(document.createElementNS(svgns, "g"))
  svg.appendChild(group);
  for (var b=0; b<nuc.length;b++){
	var t = nuc[b], glide = "";
	if (t.charAt(0) == "w") {
		t = t.substr(1);
		glide = t == "a" || t == "aw" || t == "e2" ? "o" : "u";
	}
	if (t == "a2") t = "ơ";
	else if (t == "aw") t = "ă";
	else if (t == "aw2") t = "â";
	else if (t == "e") t = "ê";
	else if (t == "e2") t = "e";
	else if (t == "i") t = glide ? "y" : "i";
	else if (t == "i2") t = glide ? "yê" : "iê";
	else if (t == "o") t = "ô";
	else if (t == "o2") t = "o";
	else if (t == "u") t = "u";
	else if (t == "u2") t = "uô";
	else if (t == "y") t = "ư";
	else if (t == "y2") t = "ươ";
	var g = document.createElementNS(svgns, "g");
	var hr = document.createElementNS(svgns, 'text');
	hr.appendChild(document.createTextNode(glide + t));
	g.appendChild(hr);
	var cls = (parseInt(b/2) % 2 == 1) ? 'even' : ' ';
	if (t.length > 1) cls += ' c2';
	if (glide) cls += ' glide';
	hr.setAttribute('class', 'smaller');
	g.setAttribute('class', cls);
	group.appendChild(g);
  }
  for (var a=0; a<pre.length;a++){
	var group = document.createElementNS(svgns, "g");
	var text = document.createElementNS(svgns, "text");
	var t = pre[a].replace('_', '');
	if (t == 'd') t = 'đ';
	else if (t == 'c') t = 'c, k';
	text.appendChild(document.createTextNode(t));
	group.appendChild(text);
	for (var b=0; b<nuc.length;b++){
		var nucleus = nuc[b], glide = "";
		if (nucleus.charAt(0) == "w") {
			nucleus = nucleus.substr(1);
			glide = true;
		}
		// invalid medial combinations like troa
		var not = false;
		if (glide && (pre[a] != "h" && "b d ph g gh gi m r v".split(" ").indexOf(pre[a]) != -1)) not = true;
		else if (glide && nucleus == "a2" && "c th h".split(" ").indexOf(pre[a]) == -1) not = true;
		else if (glide && pre[a] == "tr" && "aw2 i i2".split(" ").indexOf(nucleus) == -1) not = true;
		else if (glide && pre[a] == "s" && "a aw2 i i2".split(" ").indexOf(nucleus) == -1) not = true;
		else if (glide && pre[a] == "t" && "aw".split(" ").indexOf(nucleus) != -1) not = true;
		else if (glide && pre[a] == "l" && "e".split(" ").indexOf(nucleus) != -1) not = true;
		else if (glide && pre[a] == "dz" && "e".split(" ").indexOf(nucleus) != -1) not = true;
		else if (glide && pre[a] == "n" && "a".split(" ").indexOf(nucleus) == -1) not = true;
		//else if (nucleus == "aw" || nucleus == "aw2") not = true;
		
		var g = document.createElementNS(svgns, "g");
		var u = document.createElementNS(svgns,"use");
		var post = getPost(glide, nucleus);
		if (!document.getElementById(onset_prefix + pre[a] + '-' + post)){
		    if(post == "large") post = "small"
		    else if (post == "small") post = "xsmall"
		    else post = "small"
		}
		if (!document.getElementById(onset_prefix + pre[a] + '-' + post)){
			if(post == "small") post = "xsmall"
		}
		u.setAttributeNS(xlinkns, 'href', '#' + onset_prefix + pre[a] + '-' + post);
		g.appendChild(u);
		if ("a aw y".split(" ").indexOf(nucleus) >= 0){
	//	    u.setAttributeNS(xlinkns, 'href', '#' + pre[a] + '-' + post + '-2');
		}
		if (glide) nucleus = "w-" + nucleus;
		g.appendChild(u);
		var u = document.createElementNS(svgns,"use");
		u.setAttributeNS(xlinkns, 'href', '#' + vowel_prefix + nucleus);
		g.appendChild(u);
		var cls = "";
		if (parseInt(b/2) % 2 == 1) cls = " even";
		if (glide) cls += ' glide';
		if (not) cls += ' not';
		if (post.indexOf("xsmall")>=0) cls+=" xsmall";
		else if(post.indexOf("large")>=0) cls+=" large";
		cls += ` char-${pre[a]}${nuc[b]} char-${pre[a]} char-${nuc[b]}`;
		if (cls) g.setAttribute('class', cls);
		g.id = "char-"+pre[a]+nuc[b];
		useG(g, "square");
		group.appendChild(g);
	}
	svg.appendChild(group);
  }
}

function addG(initial, vowel) {
	var g = document.createElementNS(svgns, "g");
	if (initial) useG(g, initial)
	if (vowel) useG(g, vowel);
	return g;
}
function useG(g, id, cls, _tone) {
	var u = document.createElementNS(svgns,"use");
	u.setAttributeNS(xlinkns, 'href', '#' + id);
	if (cls) u.setAttribute('class', cls);
	g.appendChild(u);
	if (_tone == 3 || _tone == 4) {
		//u.setAttribute('transform', "scale(1,.94)");
		u.setAttribute('vector-effect', 'non-scaling-stroke');
		u.style["vector-effect"] = "non-scaling-stroke"
	}
	return g;
}
function paSvg(root, initial, vowel, final, tone, bold, isCoda) {
	var css = this;
	var d = document, svg = d.createElementNS(svgns, "svg");
	var g;
	var glide = 0;
	if (initial || vowel){
		g = addG();
		useG(g, 'square')
		svg.appendChild(g);
	}
	var color = initial && initial.indexOf("$") >= 0 ? 1 : 0;
	var underline = initial && initial.indexOf("#") >= 0 ? 1 : 0;
	svg.setAttribute("class", "char" + (underline?" underline":"") + (color?" color":""));
	if (initial) {
		initial = initial.replace("#", "").replace("$", "");
		var post = getPost(vowel.charAt(0)=="w", vowel)
		var id = onset_prefix + initial+ '-' + post;
		if (!document.getElementById(id)) {
		id = id.replace("xx", "x").replace("large", "xxsmall")
		}
		if (!document.getElementById(id)) {
		id = id.replace("x", "")
		}
		if (!document.getElementById(id)) id = id.replace("x", "")
		useG(g, id);
	}
	if (vowel) {
		if (vowel.charAt(0) == "w") {
			vowel = vowel.substr(1);
			useG(g, onset_prefix + initial + '-medial');
		}
		useG(g, (isCoda ? coda_prefix : vowel_prefix) + vowel);
		
	}
	svg.setAttribute("viewBox", "-10 -25 120 125");
	svg.style.height = "150px";
	svg.style.width = "130px";
	svg.style.marginBottom = "30px";
	svg.style.verticalAlign = "bottom";
	svg.style.border = "none";
	if (g) (root || d.getElementById("out")).appendChild(svg);
	if (g && vowel && "waeiouy".indexOf(vowel[0]) >= 0) {
	    if (qatt_tones) useG(g, "qt" + (tone || 0))
	}
	if (tone != null && tone < 0){
		tone = Math.abs(tone);
		if (!final){
			paSvg(root, "", "_tlarge"+tone);
			//paSvg(null, "", vowel)
		}else{
			var tonesize = "";
			if (tone >= 0) tonesize = "small";
			var g = paSvg(
				root,
				(color?"$":"")+(underline?"#":""),
				final.toUpperCase() + (tone?'_t':'') + tonesize,
				"",
				null,
				bold,
				true);
			useG(g, "_t"+tone);
		}
	} else {
		if (tone < 0) tone = -tone
		if (final) {
			var tonesize = "";
			if (tone >= 3) tonesize = "small";
			if (tone) {
			    if (qatt_tones) {
			    	g = paSvg(root, (color?"$":"")+(underline?"#":""), final.toUpperCase(), 0, null, null, true);
			    } else {
			    
					g = paSvg(root, (color?"$":"")+(underline?"#":""), final.toUpperCase() + '_t' + tonesize, 0, null, null, true);
					useG(g, "_t" + tone)
				}
			} else {
				//if (tone) useG(g, "_t" + tone)
				g = paSvg(root, (color?"$":"")+(underline?"#":""), final.toUpperCase(), 0, null, null, true);
			}
		}
		else if (tone != null) {
		  if (!qatt_tones) {
		    g = paSvg(root, (color?"$":"")+(underline?"#":""), '_tlarge' + tone, 0, null, null, true);
		    //useG(g, "_tlarge" + tone);
		  } else {
			//useG(g, "_tlarge" + tone);
		  }
		}
	}
	//if (final) useG(g, 'square')
	return g;
}
function paChr(t, root){
	var d = document, el = d.createElement("div");
	el.style.display = "inline-block";
	el.style.width = "110px";
	el.style.height = "110px";
	el.style.lineHeight = "110px";
	el.style.textAlign = "center";
	el.style.verticalAlign = "bottom";

	el.style.fontSize = char_fontsize;
	el.style.fontWeight = "400";
	if (t.indexOf("$") >= 0 && t.indexOf("#") >= 0) el.className = "color underline";
	else if (t.indexOf("$") >= 0) el.className = "color";
	else if (t.indexOf("#") >= 0) el.className = "underline";
	t = t.replace("#", "").replace("$", "");
	(root || d.getElementById("out")).appendChild(el);
	el.appendChild(d.createTextNode(t));
}
function paBr(n){
	var d = document;
	d.getElementById("out").appendChild(d.createElement("br"));
	if (n > 1) {
		for(var i = 1; i < n; i++) {
			pa(" ");
			d.getElementById("out").appendChild(d.createElement("br"));
		}
	}
}
function pa(T, root){
	txt = T.split(" ");
	for (var i=0,ilen=txt.length; i<ilen; i++){
		var t = txt[i];
		if (t.indexOf(",") > -1) paSvg.apply(null, [root, ].concat(t.split(",")));
		else paChr(t, root);
	}
}
